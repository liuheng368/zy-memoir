# GitHub Pages 自动部署
#
# 触发：
#   - push 到 main / feat/memoir-home 自动构建并发布
#   - 也可在 Actions 面板手动 workflow_dispatch
#
# 站点 URL：https://<owner>.github.io/zy-memoir/
# Vite base 由 `GH_PAGES=1` 切到 `/zy-memoir/`，并由 build:gh 拷贝 404.html
# 兜底（GitHub Pages 路径未命中时返回 404.html，client router 接管）。
#
# 前置（仓库 Settings 需手动开一次）：
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - feat/memoir-home
  workflow_dispatch:

# 一份并发：新提交会自动取消旧的 in-progress 部署
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Build (GitHub Pages)
        run: pnpm build:gh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
